<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
    <div th:fragment="content">
        <div class="div-cadastrar">
            <h2>Cadastro de CAE (Administrador)</h2>
            <form th:action="@{/cadastrar/cae}" th:method="POST" enctype="multipart/form-data" th:object="${cae}" class="form-cadastro">
                <label for="nome_cae">Nome:</label>
                <div class="error" th:errors="*{nome}"></div>
                <input id="nome_cae" th:field="*{nome}" type="text" placeholder="Ex: João" required>
                <label for="email_cae">E-mail:</label>
                <div class="error" th:errors="*{email}"></div>
                <input id="email_cae" th:field="*{email}" type="email" placeholder="Ex: cae.exemplo@cae.ifsp.edu.br" required>
                <label for="prontuario_cae">Prontuário:</label>
                <div class="error" th:errors="*{prontuario}"></div>
                <input id="prontuario_cae" th:field="*{prontuario}" type="text" placeholder="EX: it3020101" required>
                <label for="senha_cae">Senha:</label>
                <div class="error" th:errors="*{senha}"></div>
                <input id="senha_cae" th:field="*{senha}" type="password" placeholder="Ex: Escolhasua1234@" required>
                <label for="upload">Imagem:</label>
                <div class="error" th:if="${mensagemErro}" th:text="${mensagemErro}"></div>
                <input id="upload" name="file" type="file" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</html>
