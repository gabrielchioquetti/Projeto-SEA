<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
    <div th:fragment="content">
        <div class="div-cadastrar">
            <h2>Cadastro de Professor</h2>
            <form th:action="@{/cadastrar/professor}" th:method="POST" enctype="multipart/form-data" th:object="${professor}" class="form-cadastro">
                <label for="nome_professor">Nome:</label>
                <div class="error" th:errors="*{nome}"></div>
                <input id="nome_professor" th:field="*{nome}" type="text" placeholder="Ex: João" required>
                <label for="email_professor">E-mail:</label>
                <div class="error" th:errors="*{email}"></div>
                <input id="email_professor" th:field="*{email}" type="email" placeholder="Ex: professor.exemplo@professor.ifsp.edu.br" required>
                <label for="prontuario_professor">Protuário:</label>
                <div class="error" th:errors="*{prontuario}"></div>
                <input id="prontuario_professor" th:field="*{prontuario}" type="text" placeholder="EX: it3020101" required>
                <label for="area">Área de atuação:</label>
                <div class="error" th:errors="*{area}"></div>
                <input id="area" th:field="*{area}" type="text" placeholder="EX: Redes" required>
                <label for="area">Senha:</label>
                <div class="error" th:errors="*{senha}"></div>
                <input id="senha_professor" th:field="*{senha}" type="password" placeholder="Ex: Escolhasua1234@" required>
                <label for="upload">Imagem:</label>
                <div class="error" th:if="${mensagemErro}" th:text="${mensagemErro}"></div>
                <input id="upload" name="file" type="file" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</html>
