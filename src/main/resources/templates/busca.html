<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base-alunoprof :: layout(~{::title}, ~{::body})}">

<head>
    <title>Busca</title>
</head>

<body>

    <div class="pagina-busca">

        <h1 class="titulo-pagina">Resultado da Busca</h1>

        <div class="card-busca">

            <p class="termo-pesquisa">
                Pesquisa:
                <strong th:text="${termo}"></strong>
            </p>

            <div class="sem-resultado" th:if="${#lists.isEmpty(resultados)}">

                Nenhum resultado encontrado.

            </div>

            <div class="tabela-wrapper" th:unless="${#lists.isEmpty(resultados)}">

                <table class="tabela-busca">

                    <thead>
                        <tr>
                            <th>Disciplina</th>
                            <th>Turma</th>
                            <th>Sala</th>
                            <th>Dia</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="horario : ${resultados}">

                            <td th:text="${horario.disciplina.nome}"></td>

                            <td th:text="${horario.turma.nome}"></td>

                            <td th:text="${horario.sala.nome}"></td>

                            <td th:text="${horario.diaSemana}"></td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
