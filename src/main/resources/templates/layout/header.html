<html>
<body>
    <header>
        <div class="logo">
            <a th:href="@{/home/}">
                <img class="imglogo" th:src="@{/Imagens/logo.png}" alt="Logo SEA">
            </a>
        </div>

        <div>
            <form th:action="@{/home/busca}" method="GET">
                <input
                    class="search"
                    type="text"
                    name="termo"
                    placeholder="Pesquisar..."
                >

                <button type="submit">
                    Buscar
                </button>

            </form>
        </div>

        <div class="perfil">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-person-circle ftperfil" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                <path fill-rule="evenodd"
                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
            </svg>
            <a class="linksmenu" th:href="@{/perfil}">Perfil</a>
        </div>
    </header>
</body>
</html>
