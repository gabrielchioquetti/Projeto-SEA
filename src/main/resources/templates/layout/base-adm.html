<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/layout/style.css}">
    <script th:src="@{/js/disciplina.js}" defer></script>
    <title>SEA</title>
</head>
<body>
    <main id="main-admin">
        <div th:if="${mensagemSucesso}" class="toast-sucesso" id="toastMsg">
            <span th:text="${mensagemSucesso}"></span>
        </div>

        <div th:replace="layout/menu :: menu"></div>

        <div id="conteudo-admin">
            <div th:replace="${content}"></div>
        </div>

    </main>
    <!-- Vlibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    <script>
        setTimeout(() => {
            const toast = document.getElementById('toastMsg');
            if (toast) {
                toast.style.display = "none";
            }
        }, 4500); // 4.5s
    </script>
</body>
</html>
