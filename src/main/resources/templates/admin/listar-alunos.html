<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
<div th:fragment="content">
    <div class="topo-listagem">
        <h3>Alunos</h3>
        <a th:href="@{/cadastrar/aluno}" class="btn-cadastrar">+ Novo Aluno</a>
    </div>

    <form method="GET" th:action="@{/listar/alunos}" class="form-busca">
        <input type="text" name="busca" th:value="${busca}" placeholder="Buscar aluno...">
        <button type="submit">Buscar</button>
    </form>

    <div class="tabela tabela-header">
        <div>Foto</div>
        <div>Prontuário</div>
        <div>Nome</div>
        <div>Email</div>
        <div>Turma</div>
        <div>Ações</div>
    </div>

    <div th:each="aluno : ${alunos.content}" class="tabela tabela-linha">
        <div>
            <img th:src="${aluno.imagem}" width="40" alt="Foto de perfil do aluno">
        </div>
        <div th:text="${aluno.prontuario}"></div>
        <div th:text="${aluno.nome}"></div>
        <div th:text="${aluno.email}"></div>
        <div>
            <span th:if="${aluno.turma != null}" th:text="${aluno.turma.nome}">
            </span>

            <span th:if="${aluno.turma == null}">
                Sem turma
            </span>
        </div>
        <div>
            <a th:href="@{/detalhes/aluno/{id}(id=${aluno.id})}">Detalhes</a>
        </div>
    </div>
    <div class="paginacao_cae">
        <a th:if="${!alunos.first}" th:href="@{/listar/alunos(page=${alunos.number - 1}, busca=${busca})}">Anterior</a>
        <span th:each="i : ${#numbers.sequence(0, alunos.totalPages - 1)}">
            <a th:href="@{/listar/alunos(page=${i}, busca=${busca})}" th:text="${i + 1}" th:classappend="${i == alunos.number} ? 'pagina-ativa'"></a>
        </span>
        <a th:if="${!alunos.last}" th:href="@{/listar/alunos(page=${alunos.number + 1}, busca=${busca})}">Próximo</a>
    </div>
</div>

</html>
