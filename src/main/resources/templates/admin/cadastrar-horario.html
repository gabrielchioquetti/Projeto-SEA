<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
    <div th:fragment="content">
        <div class="div-cadastrar">
            <h2>Cadastro de Horário</h2>
            <form th:action="@{/cadastrar/horario}" th:method="POST" th:object="${horario}" class="form-cadastro">
                <label>Dia da Semana:</label>
                <select th:field="*{diaSemana}">
                    <option value="">Selecione</option>
                    <option value="SEGUNDA">Segunda</option>
                    <option value="TERCA">Terça</option>
                    <option value="QUARTA">Quarta</option>
                    <option value="QUINTA">Quinta</option>
                    <option value="SEXTA">Sexta</option>
                </select>
                <div class="error" th:errors="*{diaSemana}"></div>

                <label>Início:</label>
                <input th:field="*{horaInicio}" type="time">
                <div class="error" th:errors="*{horaInicio}"></div>

                <label>Fim:</label>
                <input th:field="*{horaFim}" type="time">
                <div class="error" th:errors="*{horaFim}"></div>

                <label>Turma:</label>
                <select th:field="*{turma.id}">
                    <option value="">Selecione</option>
                    <option th:each="t : ${turmas}" 
                            th:value="${t.id}" 
                            th:text="${t.nome}">
                    </option>
                </select>

                <label>Disciplina:</label>
                <select th:field="*{disciplina.idDisciplina}">
                    <option value="">Selecione</option>
                    <option th:each="d : ${disciplinas}" 
                            th:value="${d.idDisciplina}" 
                            th:text="${d.nome}">
                    </option>
                </select>

                <label>Professor:</label>
                <select th:field="*{professor.id_professor}">
                    <option value="">Selecione</option>
                    <option th:each="p : ${professores}" 
                            th:value="${p.id_professor}" 
                            th:text="${p.nome}">
                    </option>
                </select>

                <label>Sala:</label>
                <select th:field="*{sala.id_sala}">
                    <option value="">Selecione</option>
                    <option th:each="s : ${salas}" 
                            th:value="${s.id_sala}" 
                            th:text="${s.nome}">
                    </option>
                </select>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</html>
