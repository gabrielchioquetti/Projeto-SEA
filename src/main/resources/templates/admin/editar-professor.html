<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
<div th:fragment="content">
    <div class="div-cadastrar">
        <h2>Editar Professor</h2>
        <form th:action="@{/editar/professor/{id}(id=${professor.id_professor})}" th:method="POST"
            enctype="multipart/form-data" th:object="${professor}" class="form-cadastro">
            <label for="nome_professor">Nome:</label>
            <div class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            <input id="nome_professor" th:field="*{nome}" type="text" placeholder="Ex: João" required>
            <label for="email_professor">E-mail:</label>
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            <input id="email_professor" th:field="*{email}" type="email" placeholder="Ex: professor@ifsp.edu.br"
                required>
            <label for="prontuario_professor">Prontuário:</label>
            <div class="error" th:if="${#fields.hasErrors('prontuario')}" th:errors="*{prontuario}"></div>
            <input id="prontuario_professor" th:field="*{prontuario}" type="text" placeholder="Ex: it3020101" required>
            <label for="area">Área de atuação:</label>
            <div class="error" th:if="${#fields.hasErrors('area')}" th:errors="*{area}"></div>
            <select id="area" th:field="*{area}" required>
                <option value="">Selecione</option>
                <option th:each="a : ${areas}" th:value="${a}" th:text="${a}"></option>
            </select>
            <label for="senha_professor">Nova senha:</label>
            <div class="error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></div>
            <input id="senha_professor" name="senha" type="password"
                placeholder="Deixe vazio para manter a senha atual">
            <label for="upload">Nova imagem:</label>
            <div class="error" th:if="${mensagemErro}" th:text="${mensagemErro}"></div>
            <input id="upload" name="file" type="file">
            <div class="preview-imagem">
                <img th:if="${professor.img_professor != null}" th:src="@{${professor.img_professor}}"
                    alt="Imagem do professor" width="120">
            </div>
            <label>Disciplinas:</label>
            <div class="error" th:if="${#fields.hasErrors('disciplinas')}" th:errors="*{disciplinas}"></div>
            <div id="lista-disciplinas">
                <div th:each="d : ${disciplinas}">
                    <input type="checkbox" th:id="'disc_' + ${d.idDisciplina}" th:field="*{disciplinas}"
                        th:value="${d.idDisciplina}">
                    <label th:for="'disc_' + ${d.idDisciplina}" th:text="${d.nome}"></label>
                </div>
            </div>
            <button type="submit">Atualizar</button>
        </form>
    </div>
</div>

</html>
