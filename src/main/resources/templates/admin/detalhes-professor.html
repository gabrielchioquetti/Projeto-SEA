<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
<div th:fragment="content">
    <div class="pagina-detalhes">
        <h2 class="titulo-detalhes">
            Detalhes do Professor
        </h2>
        <div class="card-detalhes">
            <div class="detalhes-imagem">
                <img th:src="@{${professor.img_professor}}" alt="">
            </div>
            <div class="detalhes-info">
                <div class="detalhe-item">
                    <span>Nome</span>
                    <p th:text="${professor.nome}"></p>
                </div>
                <div class="detalhe-item">
                    <span>Email</span>
                    <p th:text="${professor.email}"></p>
                </div>
                <div class="detalhe-item">
                    <span>Prontuário</span>
                    <p th:text="${professor.prontuario}"></p>
                </div>
                <div class="detalhe-item">
                    <span>Área</span>
                    <p th:text="${professor.area}"></p>
                </div>
                <div class="detalhe-item">
                    <span>Disciplinas</span>
                    <div class="lista-tags">
                        <span class="tag" th:each="d : ${professor.disciplinas}" th:text="${d.nome}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="detalhes-acoes">
            <a href="" class="btn-editar">Editar</a>
            <a href="" class="btn-deletar">Deletar</a>
        </div>
    </div>
</div>
</html>
