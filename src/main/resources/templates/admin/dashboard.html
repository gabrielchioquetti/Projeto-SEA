<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">

<div th:fragment="content">

    <h3>Painel do Administrador</h3>

    <div class="acoes-relatorio">

        <a th:href="@{/api/relatorios/ensalamento}" target="_blank" class="btn-relatorio-geral">

            <i class="bi bi-file-earmark-pdf-fill"></i>
            Relatório Geral

        </a>

    </div>

    <!-- 📊 CARDS -->
    <div class="tabela">

        <div class="quantidade-itens">
            <h4>Alunos</h4>
            <p th:text="${totalAlunos}">0</p>
        </div>

        <div class="quantidade-itens">
            <h4>Professores</h4>
            <p th:text="${totalProfessores}">0</p>
        </div>

        <div class="quantidade-itens">
            <h4>Salas</h4>
            <p th:text="${totalSalas}">0</p>
        </div>

        <div class="quantidade-itens">
            <h4>Aulas de Hoje</h4>
            <p th:text="${totalAulasHoje}">0</p>
        </div>

    </div>

    <!-- 📅 AULAS DE HOJE -->
    <h3>Aulas de Hoje</h3>

    <div class="tabela tabela-header">
        <div>Dia</div>
        <div>Horário</div>
        <div>Professor</div>
        <div>Sala</div>
    </div>

    <div th:each="h : ${aulasHoje}" class="tabela tabela-linha">

        <div th:text="${h.diaSemana}"></div>

        <div>
            <span th:text="${h.horaInicio}"></span>
            -
            <span th:text="${h.horaFim}"></span>
        </div>

        <div th:text="${h.professor.nome}"></div>

        <div th:text="${h.sala.nome}"></div>

    </div>

    <!-- 📅 PRÓXIMAS AULAS -->
    <h3>Próximas Aulas</h3>

    <div class="tabela tabela-header">
        <div>Dia</div>
        <div>Horário</div>
        <div>Professor</div>
        <div>Sala</div>
    </div>

    <div th:each="h : ${proximasAulas}" class="tabela tabela-linha">

        <div th:text="${h.diaSemana}"></div>

        <div>
            <span th:text="${h.horaInicio}"></span>
            -
            <span th:text="${h.horaFim}"></span>
        </div>

        <div th:text="${h.professor.nome}"></div>

        <div th:text="${h.sala.nome}"></div>

    </div>

</div>

</html>
