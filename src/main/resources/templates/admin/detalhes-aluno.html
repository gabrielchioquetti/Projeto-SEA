<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base-adm :: layout(~{::content})">
<div th:fragment="content">
    <h2 class="titulo-detalhes">Detalhes do Aluno</h2>
    <div class="card-detalhes">
        <div class="detalhes-imagem">
            <img th:src="@{${aluno.img_aluno}}" alt="">
        </div>

        <div class="detalhes-info">

            <div class="detalhe-item">
                <span>Nome</span>
                <p th:text="${aluno.nome}"></p>
            </div>

            <div class="detalhe-item">
                <span>Email</span>
                <p th:text="${aluno.email}"></p>
            </div>

            <div class="detalhe-item">
                <span>Prontuário</span>
                <p th:text="${aluno.prontuario}"></p>
            </div>
        </div>
    </div>
    <div class="detalhes-acoes">
        <a href="" class="btn-editar">Editar</a>
        <a href="" class="btn-deletar">Deletar</a>
    </div>
</div>
</html>
